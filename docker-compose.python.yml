services:
  ui:
    build:
      context: ./ethosterra-ui
      dockerfile: Dockerfile
      args:
        WS_URL: ws://localhost:8000/wpsViewer
        API_URL: http://localhost:8001
    container_name: ethosterra-ui
    ports:
      - "3002:3000"
    environment:
      NEXT_PUBLIC_WS_URL: ws://localhost:8000/wpsViewer
      NEXT_PUBLIC_API_URL: http://localhost:8001
      SIMULATOR_API_URL: http://simulator:8001
      ETHOSTERRA_ROOT: /app
      ETHOSTERRA_START: /app/ethosterra/start.py
      PYTHON_BIN: python3
    volumes:
      - ./data/logs:/app/data/logs
      - ./reports:/app/reports
    depends_on:
      - simulator
    profiles: ["full", "ui"]

  ollama:
    image: ollama/ollama:latest
    container_name: ethosterra-ollama
    volumes:
      - ollama-data:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: 24h
    healthcheck:
      test: ["CMD-SHELL", "/bin/ollama list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    profiles: ["full", "ollama"]

  ollama-init:
    image: ollama/ollama:latest
    container_name: ethosterra-ollama-init
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "until /bin/ollama list >/dev/null 2>&1; do sleep 3; done && (/bin/ollama list | grep -q gemma3 || /bin/ollama pull gemma3:4b) && echo 'Model ready.'"
    environment:
      OLLAMA_HOST: http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    profiles: ["full", "ollama"]

  redis:
    image: redis:7-alpine
    container_name: ethosterra-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    profiles: ["full", "redis"]

  postgres:
    image: postgres:16-alpine
    container_name: ethosterra-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ethosterra
      POSTGRES_USER: ethosterra
      POSTGRES_PASSWORD: ethosterra
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ethosterra -d ethosterra"]
      interval: 5s
      timeout: 3s
      retries: 5
    profiles: ["full", "postgres"]

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ethosterra-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: ["full", "distributed"]

  simulator:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: ethosterra-sim
    ports:
      - "8000:8000"
      - "8001:8001"
    environment:
      ETHOSTERRA_ROOT: /app
      REDIS_HOST: redis
      REDIS_PORT: 6379
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ethosterra
      POSTGRES_USER: ethosterra
      POSTGRES_PASSWORD: ethosterra
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      ETHOSTERRA_LOGS_PATH: /app/data/logs/wpsSimulator.csv
      OLLAMA_URL: http://ollama:11434
    volumes:
      - ./data/logs:/app/data/logs
      - ./data/experiments:/app/data/experiments
      - ./data/ebdi:/app/data/ebdi
      - ./data/worlds:/app/data/worlds
      - ./reports:/app/reports
    depends_on:
      redis:
        condition: service_healthy
        required: false
      postgres:
        condition: service_healthy
        required: false
      rabbitmq:
        condition: service_healthy
        required: false
      ollama:
        condition: service_healthy
        required: false
    command: ["--wait", "--world-file", "data/worlds/land_world.origin.json"]

  simulator-dev:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: ethosterra-sim-dev
    ports:
      - "8001:8000"
    environment:
      ETHOSTERRA_ROOT: /app
      ETHOSTERRA_LOGS_PATH: /app/data/logs/wpsSimulator-dev.csv
    volumes:
      - ./besa-python/besa:/app/besa
      - ./ethosterra-python/ethosterra:/app/ethosterra
      - ./data/ebdi:/app/data/ebdi
      - ./data/logs:/app/data/logs
    command: ["--agents", "3", "--years", "1", "--speed", "0.005"]
    profiles: ["dev"]

volumes:
  redis-data:
  postgres-data:
  ollama-data:
