services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

  container-a:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["java", "-cp", "/app/wps-simulator.jar", "org.wpsim.BesaTesting.MainTest", "ContainerA"]
    environment:
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy

  container-b:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["java", "-cp", "/app/wps-simulator.jar", "org.wpsim.BesaTesting.MainTest", "ContainerB"]
    environment:
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy

  container-c:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["java", "-cp", "/app/wps-simulator.jar", "org.wpsim.BesaTesting.MainTest", "ContainerC"]
    environment:
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy
