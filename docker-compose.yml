services:
  webapp:
    build:
      context: .
      dockerfile: Dockerfile
      target: webapp
    ports:
      - "3000:3000" # Next.js frontend
      - "8000:8000" # WebSocket server de ViewerLens (Undertow) — wpsSimulator/ViewerLens/Server/WebsocketServer.java
    env_file: .env
    environment:
      - JAVA_TOOL_OPTIONS=-Xmx2g -Xms512m -Djdk.internal.event.EventHelper.logX509CertificateEvent=false
    volumes:
      - ./data/logs:/app/src/wps/logs
    deploy:
      resources:
        limits:
          memory: 12g
          cpus: "4.0"
    restart: unless-stopped
    depends_on:
      - wpsllm-sidecar
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # wellprodsim ya no se usa separadamente; está integrado en webapp
  # wellprodsim:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #     target: headless
  #   ...


  wpsllm-sidecar:
    build:
      context: ./wpsllm-sidecar
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - ./data:/data
      - ./output:/output
    environment:
      - LLM_API_URL=http://llama-cpp:8080/v1
      - LLM_MODEL=gemma4:e4b
      - PYTHONUNBUFFERED=1
      - HYBRID_MONEY_THRESHOLD=10000000
      - HYBRID_HEALTH_THRESHOLD=101
    depends_on:
      - llama-cpp
    restart: unless-stopped

  llama-cpp:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    ports:
      - "8080:8080"
    volumes:
      - ./models:/models
    # Configuración para RTX 4060 (8GB VRAM)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    command: >
      --model /models/gemma-4-E4B-it-Q4_K_M.gguf --host 0.0.0.0 --port 8080 --n-gpu-layers 35 --parallel 16 --ctx-size 32768
    restart: unless-stopped
