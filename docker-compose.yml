services:
  wellprodsim:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
      - "8000:8000"  # WebSocket server de ViewerLens (Undertow) — wpsSimulator/ViewerLens/Server/WebsocketServer.java
    env_file: .env
    environment:
      # Limitar heap de JVM: evita OOM Kill cuando la malla tiene >150 agentes
      # (sobreescribe el valor del .env si se definen ahí)
      - JAVA_TOOL_OPTIONS=-Xmx2g -Xms512m
      # HOSTNAME ya está fijado en el Dockerfile a 0.0.0.0
      - RABBITMQ_HOST=rabbitmq
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=wellprodsim
      - POSTGRES_USER=wps
      - POSTGRES_PASSWORD=wps_local
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      # Persistir logs y CSV de experimentos en el host
      # Los datos sobreviven a `docker compose down`
      - ./data/logs:/app/src/wps/logs
    deploy:
      resources:
        limits:
          # Java (2g heap) + Node.js + SO overhead ~3.5 GB en pico
          memory: 4g
          # Evitar que la simulación monopolice el host durante experimentos largos
          cpus: "2.0"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/simulator/app-path"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Servicio para ejecutar simulaciones directas (headless)
  # Ejemplo: docker compose run simulation
  simulation:
    build:
      context: .
      dockerfile: Dockerfile
      target: javaonly
    environment:
      - JAVA_TOOL_OPTIONS=-Xmx2g -Xms512m
      - RABBITMQ_HOST=rabbitmq
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=wellprodsim
      - POSTGRES_USER=wps
      - POSTGRES_PASSWORD=wps_local
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data/logs/manual:/app/logs
    command: ["-agents", "5", "-years", "1", "-mode", "single"]

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis/redis-stack:latest
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --save 60 1 --loglevel warning --protected-mode no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: wellprodsim
      POSTGRES_USER: wps
      POSTGRES_PASSWORD: wps_local
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./sql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wps -d wellprodsim"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis-data:
  pg-data:
